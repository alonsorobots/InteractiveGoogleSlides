# Example website_slides.conf
#
# Copy this next to your deck's manifest (e.g. as <deck_dir>/website_slides.conf).
# It lets you drop a live website in as its OWN standalone slide, inserted after a
# given frame. This file is read at build time and is independent of manifest.json,
# so it survives a re-import (which rewrites manifest.json wholesale).
#
# One embed per line, pipe-delimited:
#
#   frame | url | scale | dx | dy | designWxH
#
#   frame     : insert a NEW slide AFTER this frame number (1-based; 0 = before slide 1)
#   url        : https://...  OR a deck-relative path (e.g. viewers/my_viewer.html)
#   scale      : uniform size multiplier over fit-to-slide (contain). 1.0 = fills the
#                slide preserving aspect; 0.5 = half size. (default 1.0)
#   dx, dy     : offset of the embed CENTER from the slide CENTER, as a fraction of
#                slide size (0,0 = centered; +x right, +y down). (default 0)
#   designWxH  : logical resolution the site lays out at; sets the aspect used for
#                uniform scaling. (default 1600x900)
#
# The site is always centered by default and scaled uniformly (never distorted),
# rendered through the generated _scale.html design-viewport scaler.
# Blank lines and lines starting with '#' are ignored.

# A full-bleed local viewer as its own slide right after slide 1:
1 | viewers/my_viewer.html | 1.0 | 0 | 0 | 1600x900

# A 60%-size external site, nudged right, on a new slide after slide 12:
12 | https://example.com | 0.6 | 0.1 | 0 | 1280x720
